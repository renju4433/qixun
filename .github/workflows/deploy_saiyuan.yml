name: Deploy Qixun To Saiyuan

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-saiyuan
      cancel-in-progress: true

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build:no-sentry

      - name: Verify Build Output
        run: |
          if grep -R "b68res.daai.fun" -n ./dist; then
            echo "Build output still contains legacy CDN URL"
            exit 1
          fi

      - name: Start SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add Host Key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Ensure Deploy Path Exists
        run: |
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
          "mkdir -p '${DEPLOY_PATH:-/var/www/qixun}'"

      - name: Clean Deploy Path
        run: |
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
          "find '${DEPLOY_PATH:-/var/www/qixun}' -mindepth 1 ! -name '.user.ini' -delete"

      - name: Sync Dist To Server
        run: |
          rsync -az \
            --exclude=".user.ini" \
            -e "ssh -p ${DEPLOY_PORT:-22}" \
            ./dist/ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH:-/var/www/qixun}/"

      - name: Reload Nginx
        run: |
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
          "if [ -x /www/server/nginx/sbin/nginx ]; then /www/server/nginx/sbin/nginx -t -c /www/server/nginx/conf/nginx.conf && /www/server/nginx/sbin/nginx -s reload || /www/server/nginx/sbin/nginx -c /www/server/nginx/conf/nginx.conf; else sudo nginx -t && (sudo systemctl reload nginx || sudo systemctl restart nginx); fi"
